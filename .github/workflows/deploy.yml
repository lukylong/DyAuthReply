name: Deploy Production

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**.md'
      - '.trellis/**'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      deploy_scheduler:
        description: '同时更新 scheduler（历史托管/定时任务链路）'
        type: boolean
        default: false
      deploy_workers:
        description: '同时更新 3 个 douyin-worker'
        type: boolean
        default: false
      run_migrate:
        description: '执行数据库 migrate'
        type: boolean
        default: true

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build frontend and sync dist
        run: bash scripts/deploy/ci-build-frontend.sh
        env:
          VITE_GLOB_API_URL: ${{ vars.VITE_GLOB_API_URL || '/basic-api/' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend-django
          file: ./backend-django/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ vars.DEPLOY_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            export DEPLOY_PATH="${{ vars.DEPLOY_PATH || '/opt/DyAuthReply' }}"
            export DEPLOY_BACKEND_IMAGE="${{ env.REGISTRY }}/${{ github.repository }}/backend:${{ github.sha }}"
            export RUN_MIGRATE="${{ github.event_name != 'workflow_dispatch' || github.event.inputs.run_migrate }}"
            export DEPLOY_SCHEDULER="${{ github.event_name != 'workflow_dispatch' || github.event.inputs.deploy_scheduler }}"
            export DEPLOY_WORKERS="${{ github.event_name != 'workflow_dispatch' || github.event.inputs.deploy_workers }}"
            export GHCR_USER="${{ github.repository_owner }}"
            export GHCR_TOKEN="${{ secrets.GHCR_PULL_TOKEN }}"
            cd "${DEPLOY_PATH}"
            git fetch origin && git reset --hard "origin/${{ github.ref_name }}"
            bash scripts/deploy/remote-deploy.sh
