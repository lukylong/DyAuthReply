{% load static %}<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- 抖音/微信等抓取卡片元信息：优先读 <title> 与 name=description（参考开源 huoxing-links 做法），
       og:* 作兼容补充。落地页**不做整页跳转**，避免爬虫执行跳转脚本后抓到目标站信息，
       从而保证卡片标题/描述来自本页（= 卡片自定义的标题/描述）。 -->
  <title>{{ title }}</title>
  <meta name="description" content="{{ description }}" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="{{ title }}" />
  <meta property="og:description" content="{{ description }}" />
  {% if cover_url %}<meta property="og:image" content="{{ cover_url }}" />{% endif %}
  <meta property="og:url" content="{{ landing_url }}" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{ title }}" />
  <meta name="twitter:description" content="{{ description }}" />
  {% if cover_url %}<meta name="twitter:image" content="{{ cover_url }}" />{% endif %}

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f5f6fa;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.08);
      padding: 28px 32px;
      max-width: 360px;
      text-align: center;
    }
    .card img {
      width: 72px;
      height: 72px;
      border-radius: 12px;
      object-fit: cover;
      margin-bottom: 16px;
    }
    .card h1 {
      font-size: 18px;
      margin: 0 0 8px;
    }
    .card p {
      font-size: 14px;
      color: #888;
      margin: 0 0 20px;
    }
    .card a {
      display: inline-block;
      padding: 10px 24px;
      background: #fe2c55;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="card" id="card" role="button" tabindex="0">
    {% if cover_url %}<img src="{{ cover_url }}" alt="" />{% endif %}
    <h1>{{ title }}</h1>
    {% if description %}<p>{{ description }}</p>{% endif %}
    <a id="go" href="{{ target_url }}">点击继续 →</a>
  </div>
  <script>
    // 不做整页跳转（避免爬虫执行后抓到目标站信息）。
    // 真人访问：尝试 window.open 打开真实链接（新开上下文，当前落地页 URL 不变）；
    // 被拦截或失败时，整页点击兜底跳转。
    (function () {
      var target = {{ target_url_json|safe }};
      function go() { try { window.location.href = target; } catch (e) {} }
      // 首次进入尝试新开窗口；移动端/抖音内置浏览器多会被拦，靠点击兜底
      try { window.open(target, '_blank'); } catch (e) {}
      var card = document.getElementById('card');
      if (card) {
        card.addEventListener('click', function (ev) {
          if (ev.target && ev.target.id === 'go') return; // <a> 自身处理
          go();
        });
      }
    })();
  </script>
</body>
</html>
