name: Build Client

on:
  push:
    tags:
      - 'client-v*'
  pull_request:
    paths:
      - 'dyauthreply-client/**'
      - 'backend-django/**'
      - 'launcher.spec'
      - 'scripts/client/**'
      - '.github/workflows/client-build.yml'
  workflow_dispatch:

concurrency:
  group: client-build-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  PYTHONUTF8: '1'
  CLIENT_LICENSE_SERVER_URL: 'https://pro.zhenyangtang.com.cn'
  LICENSE_LEASE_PUBLIC_KEY_B64: ${{ secrets.LICENSE_LEASE_PUBLIC_KEY_B64 }}

jobs:
  build:
    name: Build (${{ matrix.platform_label }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform_label: macOS Apple Silicon
            rust_target: aarch64-apple-darwin
            artifact_name: dyauthreply-macos-aarch64
            bundle: dmg
          - os: windows-latest
            platform_label: Windows x64
            rust_target: x86_64-pc-windows-msvc
            artifact_name: dyauthreply-windows-x64
            bundle: nsis
            python_arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: ${{ matrix.python_arch || 'x64' }}
          cache: pip
          cache-dependency-path: backend-django/requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            dyauthreply-client/client-ui/package-lock.json
            dyauthreply-client/desktop/package-lock.json
            backend-django/core/douyin/runtime/transport/sign/js/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust cross-compilation target
        run: rustup target add ${{ matrix.rust_target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: dyauthreply-client/desktop/src-tauri

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r backend-django/requirements.txt

      - name: Build launcher sidecar (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: python3 scripts/client/build_launcher.py --rust-target "${{ matrix.rust_target }}"

      - name: Build launcher sidecar (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: python scripts/client/build_launcher.py --rust-target "${{ matrix.rust_target }}"

      - name: Smoke test launcher sidecar (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: python scripts/client/smoke_test_launcher.py "dyauthreply-client/desktop/src-tauri/binaries/launcher-${{ matrix.rust_target }}.exe"

      - name: Install npm dependencies
        shell: bash
        run: |
          npm ci --prefix dyauthreply-client/client-ui
          npm ci --prefix dyauthreply-client/desktop

      - name: Build Tauri desktop app
        working-directory: dyauthreply-client/desktop
        run: npm run tauri build -- --target ${{ matrix.rust_target }} --bundles ${{ matrix.bundle }}

      - name: Collect installer files only
        shell: bash
        run: |
          mkdir -p dist-installers
          shopt -s nullglob
          found=0
          bundle_root="dyauthreply-client/desktop/src-tauri/target/${{ matrix.rust_target }}/release/bundle"
          if [ "${{ matrix.bundle }}" = "dmg" ]; then
            patterns=("$bundle_root/dmg/*.dmg")
          else
            patterns=("$bundle_root/nsis/*-setup.exe")
          fi
          for pattern in "${patterns[@]}"; do
            for f in $pattern; do
              cp "$f" dist-installers/
              found=1
              echo "Collected: $(basename "$f")"
            done
          done
          if [ "$found" -eq 0 ]; then
            echo "No installer found under $bundle_root"
            exit 1
          fi
          ls -la dist-installers/

      # Release tag: upload installers directly to GitHub Release (avoid Actions artifact quota).
      - name: Create GitHub Release and upload (macOS)
        if: startsWith(github.ref, 'refs/tags/client-v') && matrix.platform_label == 'macOS Apple Silicon'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: DyAuthReply Client ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body_path: .github/client-release-notes.md
          files: dist-installers/*
          fail_on_unmatched_files: true

      - name: Append installer to GitHub Release (Windows)
        if: startsWith(github.ref, 'refs/tags/client-v') && matrix.platform_label == 'Windows x64'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist-installers/*
          fail_on_unmatched_files: true
          make_latest: false

      # 同步到公开下载仓（主仓私有，外部无法直接下载其 Release）。
      # 用 DIST_REPO_TOKEN（对 DyAuthReply-dist 有写权限的 PAT）把安装包以稳定文件名
      # 上传到公开仓的滚动 client-latest Release，落地页 latest/download 链接始终有效。
      - name: Sync installer to public download repo
        if: startsWith(github.ref, 'refs/tags/client-v')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.DIST_REPO_TOKEN }}
          DIST_REPO_TOKEN: ${{ secrets.DIST_REPO_TOKEN }}
          DIST_REPO: lukylong/DyAuthReply-dist
        run: |
          set -euo pipefail
          if [ -z "${DIST_REPO_TOKEN:-}" ]; then
            echo "DIST_REPO_TOKEN 未配置，跳过公开仓同步"
            exit 0
          fi
          if [ "${{ matrix.bundle }}" = "dmg" ]; then
            src=$(ls dist-installers/*.dmg | head -n1)
            asset="DAssistant-macos-aarch64.dmg"
          else
            src=$(ls dist-installers/*-setup.exe | head -n1)
            asset="DAssistant-windows-x64-setup.exe"
          fi
          cp "$src" "$asset"
          # 确保滚动 release 存在（首次或被删除时自动创建并标记为 latest）
          if ! gh release view client-latest --repo "$DIST_REPO" >/dev/null 2>&1; then
            gh release create client-latest --repo "$DIST_REPO" --latest \
              --title "D助手 客户端与插件下载" \
              --notes "安装包随新版本滚动更新，本 Release 始终为最新版。"
          fi
          gh release upload client-latest "$asset" --repo "$DIST_REPO" --clobber
          echo "已同步 $asset 到 $DIST_REPO (client-latest)"

      # PR / manual runs: keep a short-lived artifact for debugging only.
      - name: Upload installer artifacts
        if: "!startsWith(github.ref, 'refs/tags/client-v')"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          retention-days: 3
          path: dist-installers/*
