name: Build Client

on:
  push:
    tags:
      - 'client-v*'
  pull_request:
    paths:
      - 'dyauthreply-client/**'
      - 'backend-django/**'
      - 'launcher.spec'
      - 'scripts/client/**'
      - '.github/workflows/client-build.yml'
  workflow_dispatch:

concurrency:
  group: client-build-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  PYTHONUTF8: '1'
  CLIENT_LICENSE_SERVER_URL: 'https://pro.zhenyangtang.com.cn'
  LICENSE_LEASE_PUBLIC_KEY_B64: ${{ secrets.LICENSE_LEASE_PUBLIC_KEY_B64 }}
  # 公开下载/更新托管仓（latest.json 变体 + 签名包发布到其 client-latest Release）
  DIST_REPO: lukylong/DyAuthReply-dist
  # 应用内更新镜像清单（镜像在前、GitHub 原站兜底）。必须与客户端默认/Rust slug 规则一致。
  UPDATE_MIRRORS: 'https://ghproxy.net/,https://gh-proxy.com/,https://ghfast.top/,https://github.com/'

jobs:
  build:
    name: Build (${{ matrix.platform_label }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform_label: macOS Apple Silicon
            rust_target: aarch64-apple-darwin
            artifact_name: dyauthreply-macos-aarch64
            bundle: app,dmg
          - os: windows-latest
            platform_label: Windows x64
            rust_target: x86_64-pc-windows-msvc
            artifact_name: dyauthreply-windows-x64
            bundle: nsis
            python_arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: ${{ matrix.python_arch || 'x64' }}
          cache: pip
          cache-dependency-path: backend-django/requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            dyauthreply-client/client-ui/package-lock.json
            dyauthreply-client/desktop/package-lock.json
            backend-django/core/douyin/runtime/transport/sign/js/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust cross-compilation target
        run: rustup target add ${{ matrix.rust_target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: dyauthreply-client/desktop/src-tauri

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r backend-django/requirements.txt

      - name: Build launcher sidecar (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: python3 scripts/client/build_launcher.py --rust-target "${{ matrix.rust_target }}"

      - name: Build launcher sidecar (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: python scripts/client/build_launcher.py --rust-target "${{ matrix.rust_target }}"

      - name: Smoke test launcher sidecar (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: python scripts/client/smoke_test_launcher.py "dyauthreply-client/desktop/src-tauri/binaries/launcher-${{ matrix.rust_target }}.exe"

      - name: Install npm dependencies
        shell: bash
        run: |
          npm ci --prefix dyauthreply-client/client-ui
          npm ci --prefix dyauthreply-client/desktop

      # 去掉 GitHub Secret 常见的尾随换行/空格，写回 GITHUB_ENV 供 tauri build 签名
      - name: Prepare minisign private key
        shell: bash
        env:
          RAW_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          cleaned="$(printf '%s' "$RAW_KEY" | tr -d '\r\n')"
          echo "TAURI_SIGNING_PRIVATE_KEY=$cleaned" >> "$GITHUB_ENV"

      - name: Build Tauri desktop app
        working-directory: dyauthreply-client/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --target ${{ matrix.rust_target }} --bundles ${{ matrix.bundle }}

      - name: Collect installer files only
        shell: bash
        run: |
          mkdir -p dist-installers
          shopt -s nullglob
          found=0
          bundle_root="dyauthreply-client/desktop/src-tauri/target/${{ matrix.rust_target }}/release/bundle"
          if [ "${{ runner.os }}" = "macOS" ]; then
            # dmg 安装包 + macOS updater 产物（.app.tar.gz）及其签名
            patterns=("$bundle_root/dmg/*.dmg" "$bundle_root/macos/*.app.tar.gz" "$bundle_root/macos/*.app.tar.gz.sig")
          else
            # NSIS 安装包（同时作为 Windows updater 产物）及其签名
            patterns=("$bundle_root/nsis/*-setup.exe" "$bundle_root/nsis/*-setup.exe.sig")
          fi
          for pattern in "${patterns[@]}"; do
            for f in $pattern; do
              cp "$f" dist-installers/
              found=1
              echo "Collected: $(basename "$f")"
            done
          done
          if [ "$found" -eq 0 ]; then
            echo "No installer found under $bundle_root"
            exit 1
          fi
          ls -la dist-installers/

      # Release tag: upload installers directly to GitHub Release (avoid Actions artifact quota).
      - name: Create GitHub Release and upload (macOS)
        if: startsWith(github.ref, 'refs/tags/client-v') && matrix.platform_label == 'macOS Apple Silicon'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: DyAuthReply Client ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body_path: .github/client-release-notes.md
          files: dist-installers/*
          fail_on_unmatched_files: true

      - name: Append installer to GitHub Release (Windows)
        if: startsWith(github.ref, 'refs/tags/client-v') && matrix.platform_label == 'Windows x64'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist-installers/*
          fail_on_unmatched_files: true
          make_latest: false

      # 同步到公开下载仓（主仓私有，外部无法直接下载其 Release）。
      # 用 DIST_REPO_TOKEN（对 DyAuthReply-dist 有写权限的 PAT）把安装包以稳定文件名
      # 上传到公开仓的滚动 client-latest Release，落地页 latest/download 链接始终有效。
      - name: Sync installer to public download repo
        if: startsWith(github.ref, 'refs/tags/client-v')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.DIST_REPO_TOKEN }}
          DIST_REPO_TOKEN: ${{ secrets.DIST_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${DIST_REPO_TOKEN:-}" ]; then
            echo "DIST_REPO_TOKEN 未配置，跳过公开仓同步"
            exit 0
          fi
          # 待上传资产列表：源文件 -> 稳定文件名
          declare -a uploads=()
          if [ "${{ runner.os }}" = "macOS" ]; then
            uploads+=("$(ls dist-installers/*.dmg | head -n1)::DAssistant-macos-aarch64.dmg")
            # macOS updater 产物 + 签名（应用内更新下载的就是 .app.tar.gz）
            if ls dist-installers/*.app.tar.gz >/dev/null 2>&1; then
              uploads+=("$(ls dist-installers/*.app.tar.gz | head -n1)::DAssistant-macos-aarch64.app.tar.gz")
            fi
            if ls dist-installers/*.app.tar.gz.sig >/dev/null 2>&1; then
              uploads+=("$(ls dist-installers/*.app.tar.gz.sig | head -n1)::DAssistant-macos-aarch64.app.tar.gz.sig")
            fi
          else
            uploads+=("$(ls dist-installers/*-setup.exe | head -n1)::DAssistant-windows-x64-setup.exe")
            # Windows NSIS 安装包同时作为 updater 产物，附带签名
            if ls dist-installers/*-setup.exe.sig >/dev/null 2>&1; then
              uploads+=("$(ls dist-installers/*-setup.exe.sig | head -n1)::DAssistant-windows-x64-setup.exe.sig")
            fi
          fi
          # 确保滚动 release 存在（首次或被删除时自动创建并标记为 latest）
          if ! gh release view client-latest --repo "$DIST_REPO" >/dev/null 2>&1; then
            gh release create client-latest --repo "$DIST_REPO" --latest \
              --title "D助手 客户端与插件下载" \
              --notes "安装包随新版本滚动更新，本 Release 始终为最新版。"
          fi
          for item in "${uploads[@]}"; do
            src="${item%%::*}"
            asset="${item##*::}"
            cp "$src" "$asset"
            gh release upload client-latest "$asset" --repo "$DIST_REPO" --clobber
            echo "已同步 $asset 到 $DIST_REPO (client-latest)"
          done

      # PR / manual runs: keep a short-lived artifact for debugging only.
      - name: Upload installer artifacts
        if: "!startsWith(github.ref, 'refs/tags/client-v')"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          retention-days: 3
          path: dist-installers/*

  # 两个平台构建并把签名包同步到 dist 仓后，统一生成多镜像 latest.json 变体并发布。
  manifest:
    name: Publish updater manifests
    needs: build
    if: startsWith(github.ref, 'refs/tags/client-v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Generate and publish latest.json variants
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.DIST_REPO_TOKEN }}
          DIST_REPO_TOKEN: ${{ secrets.DIST_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${DIST_REPO_TOKEN:-}" ]; then
            echo "DIST_REPO_TOKEN 未配置，跳过 manifest 发布"
            exit 0
          fi

          version=$(python3 -c "import json;print(json.load(open('dyauthreply-client/desktop/src-tauri/tauri.conf.json'))['version'])")
          pub_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          notes="${GITHUB_REF_NAME:-}"

          mkdir -p sigs dist-manifests
          # 从 dist 仓 client-latest 拉取各平台 updater 产物签名（由 build 阶段上传）
          gh release download client-latest --repo "$DIST_REPO" \
            --pattern 'DAssistant-windows-x64-setup.exe.sig' --dir sigs --clobber || true
          gh release download client-latest --repo "$DIST_REPO" \
            --pattern 'DAssistant-macos-aarch64.app.tar.gz.sig' --dir sigs --clobber || true

          args=(--version "$version" --pub-date "$pub_date" --notes "$notes"
                --mirrors "$UPDATE_MIRRORS" --out-dir dist-manifests)
          if [ -f sigs/DAssistant-windows-x64-setup.exe.sig ]; then
            args+=(--windows-url "https://github.com/$DIST_REPO/releases/latest/download/DAssistant-windows-x64-setup.exe"
                   --windows-sig-file sigs/DAssistant-windows-x64-setup.exe.sig)
          fi
          if [ -f sigs/DAssistant-macos-aarch64.app.tar.gz.sig ]; then
            args+=(--macos-url "https://github.com/$DIST_REPO/releases/latest/download/DAssistant-macos-aarch64.app.tar.gz"
                   --macos-sig-file sigs/DAssistant-macos-aarch64.app.tar.gz.sig)
          fi

          python3 scripts/client/gen_update_manifest.py "${args[@]}"

          ls -la dist-manifests/
          gh release upload client-latest dist-manifests/latest*.json --repo "$DIST_REPO" --clobber
          echo "已发布 latest.json 多镜像变体到 $DIST_REPO (client-latest)"
