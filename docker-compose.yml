# =============================================================================
# zq-platform 本地一体化开发 / 联调环境
#
# 启动：  docker compose up -d --build
# 停止：  docker compose down
# 清库：  docker compose down -v   (慎用：会删除 PostgreSQL / Redis / 日志数据卷)
#
# 默认端口映射：
#   - 5432 → postgres
#   - 6379 → redis
#   - 8000 → backend-django (uvicorn/ASGI)
#   - 5777 → web-ele 前端 (Vite)
#
# 配置优先级：.env (compose 变量) > docker-compose.yml 默认值 > 镜像内默认值
# =============================================================================

name: zq-platform

x-backend-env: &backend-env
  ZQ_ENV: dev
  # --- Database (PostgreSQL) ---
  DATABASE_TYPE: POSTGRESQL
  DATABASE_HOST: postgres
  DATABASE_PORT: "5432"
  DATABASE_NAME: ${POSTGRES_DB:-zq_platform}
  DATABASE_USER: ${POSTGRES_USER:-zq}
  DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-zq_pass_change_me}
  # --- Redis ---
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_DB: "2"
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  # --- Django ---
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-compose-secret-change-me}
  JWT_ACCESS_SECRET_KEY: ${JWT_ACCESS_SECRET_KEY:-dev-compose-access-secret}
  JWT_REFRESH_SECRET_KEY: ${JWT_REFRESH_SECRET_KEY:-dev-compose-refresh-secret}
  # --- Douyin (纯 HTTP 协议，无浏览器) ---
  DOUYIN_DATA_DIR: /var/lib/zq-platform/douyin
  DOUYIN_STORAGE_ENCRYPTION_KEY: ${DOUYIN_STORAGE_ENCRYPTION_KEY:-}
  DOUYIN_REDIS_CHANNEL_PREFIX: douyin
  DOUYIN_WORKER_LOCALE: ${DOUYIN_WORKER_LOCALE:-zh-CN}
  DOUYIN_WORKER_TIMEZONE: ${DOUYIN_WORKER_TIMEZONE:-Asia/Shanghai}
  DOUYIN_SNIFFER_DIR: ${DOUYIN_SNIFFER_DIR:-}
  DOUYIN_SNIFFER_MAX_BODY: ${DOUYIN_SNIFFER_MAX_BODY:-32768}
  DOUYIN_SNIFFER_URL_KEYWORDS: ${DOUYIN_SNIFFER_URL_KEYWORDS:-}
  # Phase 2 transport：true 时启用 WS 入向消息快路径（默认关闭，灰度开启）
  DOUYIN_TRANSPORT_WS_INBOUND: ${DOUYIN_TRANSPORT_WS_INBOUND:-false}
  # 脱浏览器：默认 http_protocol（纯协议，浏览器子系统已移除）
  DOUYIN_TRANSPORT_BACKEND: ${DOUYIN_TRANSPORT_BACKEND:-http_protocol}
  # 签名后端：'js'(dy_ab.js + bd-ticket-guard，脱浏览器，唯一支持)
  # 必须在此显式声明，compose 才会把 .env 里的 DOUYIN_SIGN_BACKEND 传进容器
  DOUYIN_SIGN_BACKEND: ${DOUYIN_SIGN_BACKEND:-js}
  # Verb 级开关：纯协议默认全开 + strict（失败直接报错，不再回退 DOM）
  DOUYIN_HTTP_PROTOCOL_SEND_TEXT: ${DOUYIN_HTTP_PROTOCOL_SEND_TEXT:-true}
  DOUYIN_HTTP_PROTOCOL_SEND_REPLY: ${DOUYIN_HTTP_PROTOCOL_SEND_REPLY:-true}
  DOUYIN_HTTP_PROTOCOL_SEND_STRICT: ${DOUYIN_HTTP_PROTOCOL_SEND_STRICT:-true}
  DOUYIN_HTTP_PROTOCOL_SCAN_INBOX: ${DOUYIN_HTTP_PROTOCOL_SCAN_INBOX:-true}
  DOUYIN_HTTP_PROTOCOL_SCAN_STRICT: ${DOUYIN_HTTP_PROTOCOL_SCAN_STRICT:-true}
  # scan_inbox 双跑对账：HTTP 解析 + DOM 扫描同时跑，对账后再翻 SCAN_INBOX=true
  DOUYIN_HTTP_PROTOCOL_SCAN_INBOX_DUAL_RUN: ${DOUYIN_HTTP_PROTOCOL_SCAN_INBOX_DUAL_RUN:-false}
  # Phase 3 dual-run：影子编码 + 真路径真发；零真发风险，配合 sniffer 做协议对账
  DOUYIN_TRANSPORT_DUAL_RUN: ${DOUYIN_TRANSPORT_DUAL_RUN:-false}
  # Worker 分片/租约（backend 监控 API 与 worker 保持一致）
  DOUYIN_WORKER_SHARD_COUNT: "${DOUYIN_WORKER_SHARD_COUNT:-3}"
  DOUYIN_WORKER_LEASE_ENABLED: "${DOUYIN_WORKER_LEASE_ENABLED:-true}"
  DOUYIN_WORKER_LEASE_TTL: "${DOUYIN_WORKER_LEASE_TTL:-45}"
  DOUYIN_SESSION_STALE_SECONDS: "${DOUYIN_SESSION_STALE_SECONDS:-120}"

# 抖音 worker 公共环境（3 分片 + Redis 租约，防止多实例重复托管同一账号）
x-douyin-worker-env: &douyin-worker-env
  <<: *backend-env
  ROLE: douyin-worker
  AUTO_MIGRATE: "false"
  DOUYIN_WORKER_SHARD_COUNT: "${DOUYIN_WORKER_SHARD_COUNT:-3}"
  DOUYIN_WORKER_LEASE_ENABLED: "${DOUYIN_WORKER_LEASE_ENABLED:-true}"
  DOUYIN_WORKER_LEASE_TTL: "${DOUYIN_WORKER_LEASE_TTL:-45}"

x-douyin-worker: &douyin-worker
  image: zq-platform/backend:dev
  restart: unless-stopped
  profiles: ["douyin"]
  command: ["douyin-worker"]
  healthcheck:
    test: ["CMD-SHELL", "pgrep -f start_douyin_worker.py >/dev/null || exit 1"]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 90s
  volumes:
    - ./backend-django:/app
    - backend-logs:/app/logs
    - douyin-data:/var/lib/zq-platform/douyin
  depends_on:
    backend:
      condition: service_started
    redis:
      condition: service_healthy
  networks:
    - zq-net

services:
  # ---------------------------------------------------------------------------
  # 基础设施
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: zq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zq_platform}
      POSTGRES_USER: ${POSTGRES_USER:-zq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zq_pass_change_me}
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: Asia/Shanghai
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zq} -d ${POSTGRES_DB:-zq_platform}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - zq-net

  redis:
    image: redis:7-alpine
    container_name: zq-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - zq-net

  # ---------------------------------------------------------------------------
  # 应用服务
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend-django
      dockerfile: Dockerfile
    image: zq-platform/backend:dev
    container_name: zq-backend
    restart: unless-stopped
    environment:
      <<: *backend-env
      ROLE: web
      AUTO_MIGRATE: "true"
      AUTO_LOADDATA: ${AUTO_LOADDATA:-false}
      UVICORN_RELOAD: ${UVICORN_RELOAD:-} # 设为 "1" 开启热重载（开发）
    command: ["web"]
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      # 开发态挂载源码以支持热重载；如需固化可注释掉
      - ./backend-django:/app
      - backend-logs:/app/logs
      - douyin-data:/var/lib/zq-platform/douyin
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - zq-net

  scheduler:
    image: zq-platform/backend:dev
    container_name: zq-scheduler
    restart: unless-stopped
    environment:
      <<: *backend-env
      ROLE: scheduler
      AUTO_MIGRATE: "false"
    command: ["scheduler"]
    volumes:
      - ./backend-django:/app
      - backend-logs:/app/logs
    depends_on:
      backend:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - zq-net

  # 抖音 worker ×3：md5(account_id) % SHARD_COUNT 静态分片 + Redis 租约（SET NX + TTL）
  # 启动（建议带 --remove-orphans 清理旧版单 worker 容器，避免重复托管）：
  #   docker compose --profile douyin up -d --remove-orphans \
  #     douyin-worker-0 douyin-worker-1 douyin-worker-2
  douyin-worker-0:
    <<: *douyin-worker
    container_name: zq-douyin-worker-0
    environment:
      <<: *douyin-worker-env
      DOUYIN_WORKER_SHARD_INDEX: "0"

  douyin-worker-1:
    <<: *douyin-worker
    container_name: zq-douyin-worker-1
    environment:
      <<: *douyin-worker-env
      DOUYIN_WORKER_SHARD_INDEX: "1"

  douyin-worker-2:
    <<: *douyin-worker
    container_name: zq-douyin-worker-2
    environment:
      <<: *douyin-worker-env
      DOUYIN_WORKER_SHARD_INDEX: "2"

  web:
    profiles: ["unused"]
    build:
      context: ./web
      dockerfile: ./scripts/deploy/Dockerfile
    image: zq-platform/web:dev
    container_name: zq-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
      - "${WEB_SSL_PORT:-443}:443"
    volumes:
      # 如需挂载 SSL 证书，请取消注释并将证书文件放在宿主机的 ./nginx/ssl 下
      # - ./nginx/ssl:/etc/nginx/ssl:ro
      - backend-logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_started
    networks:
      - zq-net
# -----------------------------------------------------------------------------
# 命名卷：PostgreSQL / Redis 数据、后端日志、抖音 storage_state、前端 node_modules
# -----------------------------------------------------------------------------
volumes:
  postgres-data:
  redis-data:
  backend-logs:
  douyin-data:
  web-node-modules:
  web-apps-node-modules:

networks:
  zq-net:
    driver: bridge
