<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="popup.css" />
  <title>抖音登录态提取器</title>
</head>
<body>
  <header class="hd">
    <h1>抖音登录态提取器</h1>
    <p class="sub">DyAuthReply · 导入登录态助手</p>
  </header>

  <div id="tabHint" class="hint hint-warn" hidden></div>

  <button id="grabBtn" class="btn btn-primary">抓取当前页面登录态</button>

  <div id="okBanner" class="hint hint-ok" hidden></div>

  <div id="accountCard" class="acct" hidden>
    <img id="acctAvatar" class="acct-avatar" alt="" referrerpolicy="no-referrer" />
    <div class="acct-meta">
      <div id="acctName" class="acct-name"></div>
      <div id="acctSub" class="acct-sub"></div>
    </div>
  </div>

  <div id="statusLine" class="status" hidden></div>

  <section id="result" class="result" hidden>
    <!-- 主路径：一键导入串，复制一次粘贴一次 -->
    <div class="field">
      <div class="field-hd">
        <span class="label">一键导入串</span>
        <span class="badge ok">推荐</span>
      </div>
      <textarea id="bundle" class="ta" rows="3" readonly></textarea>
      <button id="copyBundleBtn" class="btn btn-primary" style="margin-top: 8px">
        复制一键导入串（粘贴到后台「一键导入串」即可）
      </button>
    </div>

    <details class="adv">
      <summary>查看 / 单独复制三项原始字段</summary>

      <div class="field">
        <div class="field-hd">
          <span class="label">Cookie</span>
          <span id="cookieStatus" class="badge"></span>
          <button class="btn btn-copy" data-copy="cookie">复制</button>
        </div>
        <textarea id="cookie" class="ta" rows="3" readonly></textarea>
      </div>

      <div class="field">
        <div class="field-hd">
          <span class="label">web_protect</span>
          <span id="wpStatus" class="badge"></span>
          <button class="btn btn-copy" data-copy="web_protect">复制</button>
        </div>
        <textarea id="web_protect" class="ta" rows="3" readonly></textarea>
      </div>

      <div class="field">
        <div class="field-hd">
          <span class="label">keys</span>
          <span id="keysStatus" class="badge"></span>
          <button class="btn btn-copy" data-copy="keys">复制</button>
        </div>
        <textarea id="keys" class="ta" rows="3" readonly></textarea>
      </div>
    </details>
  </section>

  <div id="toast" class="toast" hidden></div>

  <footer class="ft">
    <p>Cookie 在 <b>douyin.com 全站共享</b>，creator / www 都能抓。
       但 <b>web_protect / keys 按站点单独存</b>，发送私信请在 <b>creator.douyin.com 私信页</b>抓。</p>
    <p><b>切换账号后</b>：在新账号页面 <b>刷新一次</b>（F5），再点「重新抓取」，
       核对上方<b>昵称 / 账号指纹</b>是否已变化。</p>
    <p>插件<b>只读取、不修改</b>任何数据；keys（私钥）在浏览器里是固定的，多次抓取值不变。</p>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
